# coturn TURN server configuration for OpenWhats
# Install: sudo apt-get install coturn
# Service: sudo systemctl enable coturn && sudo systemctl start coturn

# Network
listening-port=3478
tls-listening-port=5349
listening-ip=0.0.0.0

# Public IP of the EC2 instance (update this to your EIP)
external-ip=3.222.228.217

# Realm and server name
realm=openwhats.app
server-name=turn.openwhats.app

# TLS (optional but recommended for turns://)
# cert=/etc/letsencrypt/live/turn.openwhats.app/fullchain.pem
# pkey=/etc/letsencrypt/live/turn.openwhats.app/privkey.pem

# HMAC-SHA1 time-limited credentials (matches our Go TURN handler)
use-auth-secret
static-auth-secret=CHANGE_ME_MATCHES_TURN_SECRET_IN_ENV

# Relay address range — restrict to RFC1918 private ranges (security)
denied-peer-ip=10.0.0.0-10.255.255.255
denied-peer-ip=192.168.0.0-192.168.255.255
denied-peer-ip=172.16.0.0-172.31.255.255

# Rate limiting
total-quota=200
bps-capacity=0
stale-nonce=600

# Logging
log-file=/var/log/coturn/turnserver.log
simple-log

# Disable CLI (not needed in production)
no-cli

# Allow loopback for health checks
no-loopback-peers=false
